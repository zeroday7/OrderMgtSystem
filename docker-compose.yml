version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: order-mgt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_mgt
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_mgt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
