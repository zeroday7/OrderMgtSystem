<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --panel: #ffffff;
            --ink: #1a1a2e;
            --ink-secondary: #555770;
            --brand: #6366f1;
            --brand-hover: #4f46e5;
            --brand-light: rgba(99, 102, 241, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --line: #e5e7eb;
            --line-light: #f3f4f6;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 6px rgba(0,0,0,0.04), 0 20px 50px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background: var(--bg);
            min-height: 100vh;
            padding: 32px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header-left h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.025em;
            line-height: 1.2;
        }

        .header-left p {
            margin-top: 6px;
            font-size: 14px;
            color: var(--ink-secondary);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--brand);
            background: var(--brand-light);
            border-radius: 999px;
        }

        .badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--brand);
        }

        /* ── Card ── */
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        thead { background: var(--line-light); }

        th {
            padding: 13px 18px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink-secondary);
            text-align: left;
            white-space: nowrap;
            border-bottom: 1px solid var(--line);
        }

        td {
            padding: 16px 18px;
            font-size: 14px;
            border-bottom: 1px solid var(--line-light);
            vertical-align: middle;
        }

        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #fafaff; }
        tbody tr:last-child td { border-bottom: none; }

        /* Column-specific */
        .col-id { width: 80px; text-align: center; color: var(--ink-secondary); font-variant-numeric: tabular-nums; }
        .col-name { font-weight: 600; }
        .col-price { font-variant-numeric: tabular-nums; }
        .col-stock { width: 90px; text-align: center; }
        .col-qty { width: 110px; }
        .col-action { width: 120px; text-align: center; }

        .stock-chip {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stock-ok { background: rgba(16,185,129,0.1); color: var(--success); }
        .stock-low { background: rgba(245,158,11,0.1); color: var(--warning); }
        .stock-out { background: rgba(239,68,68,0.08); color: var(--danger); }

        /* ── Input & Button ── */
        .qty {
            width: 72px;
            padding: 8px 10px;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
            font-variant-numeric: tabular-nums;
        }

        .qty:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }

        .order-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: none;
            border-radius: var(--radius-sm);
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            background: var(--brand);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        }

        .order-btn:hover {
            background: var(--brand-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .order-btn:active { transform: translateY(0); }

        .order-btn:disabled {
            opacity: 0.55;
            cursor: wait;
            transform: none;
            box-shadow: none;
        }

        .order-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ── Empty state ── */
        .empty {
            padding: 72px 24px;
            text-align: center;
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: var(--line-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg { width: 28px; height: 28px; color: var(--ink-secondary); }

        .empty p {
            font-size: 15px;
            color: var(--ink-secondary);
            line-height: 1.6;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow-lg);
            font-size: 14px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            max-width: 380px;
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error   { border-left: 4px solid var(--danger); }

        .toast-icon { flex-shrink: 0; width: 20px; height: 20px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(40px); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body { padding: 16px 12px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-left h1 { font-size: 22px; }
            td, th { padding: 12px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="header-left">
            <h1>상품 목록 &amp; 주문</h1>
            <p>수량을 입력하고 주문하기 버튼을 누르면 즉시 주문 API를 호출합니다.</p>
        </div>
        <span th:if="${!#lists.isEmpty(products)}" class="badge"
              th:text="'총 ' + ${#lists.size(products)} + '개 상품'">총 0개 상품</span>
    </header>

    <div class="card">
        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(products)}" class="empty">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m6 4.125 2.25 2.25m0 0 2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/>
                </svg>
            </div>
            <p>등록된 상품이 없습니다.<br>먼저 상품을 등록해 주세요.</p>
        </div>

        <!-- Product table -->
        <div th:if="${!#lists.isEmpty(products)}" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th>상품명</th>
                    <th>가격</th>
                    <th class="col-stock">재고</th>
                    <th class="col-qty">주문 수량</th>
                    <th class="col-action">주문</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td class="col-id" th:text="${product.productId}">1</td>
                    <td class="col-name" th:text="${product.name}">상품명</td>
                    <td class="col-price"
                        th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '원'">10,000원</td>
                    <td class="col-stock">
                        <span class="stock-chip"
                              th:classappend="${product.stockQuantity == 0 ? 'stock-out' : (product.stockQuantity <= 5 ? 'stock-low' : 'stock-ok')}"
                              th:text="${product.stockQuantity}">10</span>
                    </td>
                    <td class="col-qty">
                        <input class="qty" type="number" min="1" value="1"
                               th:id="'qty-' + ${product.productId}">
                    </td>
                    <td class="col-action">
                        <button class="order-btn" type="button"
                                th:attr="data-product-id=${product.productId}"
                                onclick="placeOrder(this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>
                            </svg>
                            주문
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;

        const iconSvg = type === 'success'
            ? '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#10b981"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'
            : '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ef4444"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>';

        toast.innerHTML = iconSvg + '<span>' + message + '</span>';
        container.appendChild(toast);

        setTimeout(function () {
            toast.style.animation = 'slideOut 0.3s ease forwards';
            toast.addEventListener('animationend', function () { toast.remove(); });
        }, 3500);
    }

    async function placeOrder(button) {
        const productId = Number(button.dataset.productId);
        const quantityInput = document.getElementById('qty-' + productId);
        const quantity = Number(quantityInput.value);

        if (!Number.isInteger(quantity) || quantity < 1) {
            showToast('주문 수량은 1 이상 정수여야 합니다.', 'error');
            return;
        }

        button.disabled = true;
        const originalHTML = button.innerHTML;
        button.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="animation:spin 0.8s linear infinite"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg> 처리 중…';

        try {
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId, quantity: quantity })
            });

            const payload = await response.json().catch(function () { return null; });

            if (response.ok) {
                showToast('주문 성공! 주문번호: ' + payload.orderNumber, 'success');
                setTimeout(function () { window.location.reload(); }, 1200);
                return;
            }

            const errorMessage = payload && payload.message
                ? payload.message
                : '주문 처리 중 오류가 발생했습니다.';
            showToast(errorMessage, 'error');
        } catch (error) {
            showToast('서버와 통신할 수 없습니다.', 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = originalHTML;
        }
    }
</script>
<style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
</body>
</html>
